<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="#0b0b0f" role="img" aria-label="CleanSpin logo">
  <title>CleanSpin</title>

  <!-- handle / cordless body -->
  <rect x="78" y="22" width="44" height="78" rx="14"/>

  <!-- power button (white inset with ⏻ glyph) -->
  <circle cx="100" cy="55" r="9" fill="#ffffff"/>
  <g stroke="#0b0b0f" stroke-width="2.2" stroke-linecap="round" fill="none">
    <line x1="100" y1="49" x2="100" y2="55.5"/>
    <path d="M 95.5 54 a 4.5 4.5 0 1 0 9 0"/>
  </g>

  <!-- neck connector -->
  <rect x="86" y="100" width="28" height="10"/>

  <!-- brush head base (wider than handle — the unmistakable scrub-brush silhouette) -->
  <ellipse cx="100" cy="118" rx="52" ry="13"/>

  <!-- bristles fanning down -->
  <g stroke="#0b0b0f" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="56"  y1="125" x2="52"  y2="172"/>
    <line x1="70"  y1="129" x2="68"  y2="178"/>
    <line x1="84"  y1="131" x2="83"  y2="180"/>
    <line x1="98"  y1="132" x2="98"  y2="180"/>
    <line x1="112" y1="132" x2="113" y2="180"/>
    <line x1="126" y1="131" x2="128" y2="180"/>
    <line x1="140" y1="129" x2="143" y2="178"/>
    <line x1="153" y1="125" x2="159" y2="172"/>
  </g>

  <!-- sparkles for "clean" -->
  <path d="M 167 46 L 170 38 L 173 46 L 181 49 L 173 52 L 170 60 L 167 52 L 159 49 Z"/>
  <path d="M 28 102 L 30 96 L 32 102 L 38 104 L 32 106 L 30 112 L 28 106 L 22 104 Z"/>
</svg>
