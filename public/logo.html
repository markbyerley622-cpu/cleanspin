<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CleanSpin — Profile Pic Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:Inter,system-ui,sans-serif;color:#f6f7fb;
    background:
      radial-gradient(900px 380px at 80% 0,rgba(255,59,107,.18),transparent 60%),
      radial-gradient(900px 380px at 0% 100%,rgba(255,177,74,.12),transparent 60%),
      #0b0b0f;
    padding:24px;
  }
  .card{
    width:100%;max-width:640px;background:#11121a;border:1px solid #23263a;
    border-radius:24px;padding:28px;box-shadow:0 30px 80px rgba(0,0,0,.5);
  }
  h1{font-family:'Bricolage Grotesque',Inter,sans-serif;letter-spacing:-0.02em;margin:0 0 4px;font-size:28px}
  .muted{color:#a4a8b8;font-size:14px;margin:0 0 22px}
  .preview-row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:22px}
  .checker{
    width:160px;height:160px;border-radius:18px;flex:0 0 auto;
    background:
      linear-gradient(45deg,#1a1d2e 25%,transparent 25%) 0 0/24px 24px,
      linear-gradient(-45deg,#1a1d2e 25%,transparent 25%) 0 0/24px 24px,
      linear-gradient(45deg,transparent 75%,#1a1d2e 75%) 0 0/24px 24px,
      linear-gradient(-45deg,transparent 75%,#1a1d2e 75%) 0 0/24px 24px,
      #0f1018;
    display:flex;align-items:center;justify-content:center;
    border:1px solid #23263a;
  }
  .checker.light{
    background:
      linear-gradient(45deg,#e9ecf3 25%,transparent 25%) 0 0/24px 24px,
      linear-gradient(-45deg,#e9ecf3 25%,transparent 25%) 0 0/24px 24px,
      linear-gradient(45deg,transparent 75%,#e9ecf3 75%) 0 0/24px 24px,
      linear-gradient(-45deg,transparent 75%,#e9ecf3 75%) 0 0/24px 24px,
      #fff;
  }
  .checker img{width:80%;height:80%;object-fit:contain;display:block}
  .preview-meta{flex:1;min-width:160px}
  .preview-meta .label{color:#a4a8b8;font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .preview-meta .name{font-weight:700}

  .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  button,a.dl{
    appearance:none;border:0;cursor:pointer;
    font-family:'Bricolage Grotesque',Inter,sans-serif;font-weight:700;font-size:15px;
    color:#fff;padding:14px 16px;border-radius:12px;text-decoration:none;text-align:center;
    background:linear-gradient(180deg,#ff3b6b,#e22556);
    box-shadow:0 8px 22px rgba(255,59,107,.35);
    transition:transform .1s ease, box-shadow .25s ease;
  }
  button:hover,a.dl:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(255,59,107,.45)}
  button.alt,a.dl.alt{background:#23263a;box-shadow:none}
  button.alt:hover,a.dl.alt:hover{background:#2c2f47}
  .hint{color:#a4a8b8;font-size:12px;margin-top:14px}
  code{background:#0f1018;padding:2px 6px;border-radius:6px;border:1px solid #23263a;font-size:12px}
</style>
</head>
<body>
  <div class="card">
    <h1>CleanSpin profile pic</h1>
    <p class="muted">Transparent PNGs. Download whichever size fits the platform you're posting on.</p>

    <div class="preview-row">
      <div class="checker"><img id="prevDark" alt="" /></div>
      <div class="checker light"><img id="prevLight" alt="" /></div>
      <div class="preview-meta">
        <div class="label">Preview</div>
        <div class="name">on dark · on light</div>
        <div class="muted" style="margin-top:6px;font-size:12px">Transparent background. Looks correct on both.</div>
      </div>
    </div>

    <div class="btns">
      <button data-size="256">Download PNG · 256</button>
      <button data-size="512">Download PNG · 512</button>
      <button data-size="1024">Download PNG · 1024</button>
      <a class="dl alt" href="/assets/cleanspin-logo.svg" download="cleanspin-logo.svg">Download SVG</a>
    </div>

    <p class="hint">Source SVG: <code>/assets/cleanspin-logo.svg</code></p>
  </div>

<script>
(async () => {
  // Load the SVG once, render previews and provide PNG download.
  const r = await fetch('/assets/cleanspin-logo.svg');
  const svgText = await r.text();
  const svgUrl = URL.createObjectURL(new Blob([svgText], { type: 'image/svg+xml' }));

  // populate previews
  document.getElementById('prevDark').src = svgUrl;
  document.getElementById('prevLight').src = svgUrl;

  function svgToPng(size) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        // canvas is transparent by default — do NOT fill background
        ctx.drawImage(img, 0, 0, size, size);
        canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error('blob failed')), 'image/png');
      };
      img.onerror = reject;
      img.src = svgUrl;
    });
  }

  document.querySelectorAll('button[data-size]').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const size = +btn.dataset.size;
      btn.disabled = true; btn.textContent = `Rendering ${size}…`;
      try {
        const blob = await svgToPng(size);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `cleanspin-${size}.png`;
        document.body.appendChild(a); a.click(); a.remove();
      } catch (e) {
        alert('Render failed: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = `Download PNG · ${size}`;
      }
    });
  });
})();
</script>
</body>
</html>
